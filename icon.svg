<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0B06"/>
      <stop offset="100%" style="stop-color:#1A1008"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A04214"/>
      <stop offset="100%" style="stop-color:#E8722A"/>
    </linearGradient>
    <linearGradient id="board" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2A1E10"/>
      <stop offset="100%" style="stop-color:#1C1409"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F0C060"/>
      <stop offset="100%" style="stop-color:#D4902A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="dropshadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle border glow -->
  <rect x="3" y="3" width="506" height="506" rx="98" fill="none" stroke="rgba(200,88,26,0.3)" stroke-width="3"/>
  <rect x="8" y="8" width="496" height="496" rx="94" fill="none" stroke="rgba(200,88,26,0.08)" stroke-width="2"/>

  <!-- Main board / document -->
  <rect x="104" y="96" width="304" height="346" rx="22" fill="url(#board)" filter="url(#dropshadow)"/>

  <!-- Orange top accent stripe -->
  <rect x="104" y="96" width="304" height="8" rx="4" fill="url(#accent)"/>
  <rect x="104" y="100" width="304" height="4" fill="url(#board)"/>

  <!-- Clip at top -->
  <rect x="196" y="76" width="120" height="44" rx="12" fill="#261A0A" stroke="rgba(200,88,26,0.4)" stroke-width="2"/>
  <rect x="214" y="86" width="84" height="24" rx="8" fill="url(#accent)"/>
  <circle cx="256" cy="98" r="7" fill="#1A1008"/>
  <circle cx="256" cy="98" r="3.5" fill="rgba(200,88,26,0.6)"/>

  <!-- Section label line -->
  <rect x="130" y="136" width="60" height="7" rx="3.5" fill="rgba(200,88,26,0.8)"/>

  <!-- Input fields row 1 -->
  <rect x="130" y="150" width="116" height="22" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="134" y="155" width="55" height="11" rx="3" fill="rgba(255,255,255,0.2)"/>

  <rect x="258" y="150" width="122" height="22" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="262" y="155" width="70" height="11" rx="3" fill="rgba(255,255,255,0.2)"/>

  <!-- Divider -->
  <rect x="120" y="184" width="272" height="1.5" rx="1" fill="rgba(200,88,26,0.2)"/>

  <!-- Section label 2 -->
  <rect x="130" y="196" width="80" height="7" rx="3.5" fill="rgba(200,88,26,0.6)"/>

  <!-- Checklist item 1 — DONE -->
  <rect x="130" y="212" width="20" height="20" rx="6" fill="#1F7A4D"/>
  <path d="M134 222 L138.5 226.5 L146 216" stroke="#fff" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="158" y="217" width="156" height="10" rx="4" fill="rgba(255,255,255,0.22)"/>
  <rect x="320" y="217" width="52" height="10" rx="4" fill="rgba(255,255,255,0.07)"/>

  <!-- Checklist item 2 — DONE -->
  <rect x="130" y="242" width="20" height="20" rx="6" fill="#1F7A4D"/>
  <path d="M134 252 L138.5 256.5 L146 246" stroke="#fff" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="158" y="247" width="130" height="10" rx="4" fill="rgba(255,255,255,0.22)"/>
  <rect x="294" y="247" width="78" height="10" rx="4" fill="rgba(255,255,255,0.07)"/>

  <!-- Checklist item 3 — IN PROGRESS -->
  <rect x="130" y="272" width="20" height="20" rx="6" fill="#D97706"/>
  <path d="M134 282 L138.5 286.5 L146 276" stroke="#fff" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="158" y="277" width="144" height="10" rx="4" fill="rgba(255,255,255,0.18)"/>
  <rect x="308" y="277" width="64" height="10" rx="4" fill="rgba(255,255,255,0.07)"/>

  <!-- Checklist item 4 — EMPTY -->
  <rect x="130" y="302" width="20" height="20" rx="6" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <rect x="158" y="307" width="112" height="10" rx="4" fill="rgba(255,255,255,0.1)"/>

  <!-- Divider -->
  <rect x="120" y="336" width="272" height="1.5" rx="1" fill="rgba(200,88,26,0.2)"/>

  <!-- Star rating -->
  <text x="130" y="368" font-family="Arial, sans-serif" font-size="36" fill="url(#gold)" letter-spacing="2">★★★★</text>
  <text x="282" y="368" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.12)">★</text>

  <!-- RP PRO text at bottom of board -->
  <text x="130" y="408" font-family="Arial Black, Arial, sans-serif" font-size="44" font-weight="900" fill="url(#accent)" letter-spacing="2">RP</text>
  <text x="188" y="408" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="rgba(255,255,255,0.35)" letter-spacing="6"> PRO</text>

  <!-- Bottom orange glow accent -->
  <ellipse cx="256" cy="490" rx="120" ry="14" fill="rgba(200,88,26,0.18)"/>
</svg>
